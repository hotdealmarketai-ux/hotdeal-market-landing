<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>핫딜마켓 가맹 상담 신청</title>
<meta name="description" content="핫딜마켓 가맹·창업 상담 신청. 성함과 연락처를 남겨주시면 빠르게 안내해 드립니다." />
<!-- 광고 전용 랜딩: 검색 노출/색인 차단 -->
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#0f1d16" />
<link rel="icon" type="image/png" href="images/logo-sym-green.png" />

<!-- 공유 미리보기 -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="핫딜마켓" />
<meta property="og:title" content="핫딜마켓 가맹 상담 신청" />
<meta property="og:description" content="성함과 연락처를 남겨주시면 빠르게 안내해 드립니다." />
<meta property="og:image" content="https://hotdealmarket.co.kr/images/og-cover.jpg" />

<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<link rel="stylesheet" href="css/style.css?v=20260620r9" />
<style>
  html, body { height: auto; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 28px 16px;
    background: linear-gradient(165deg, #eef4f0 0%, #e3ece6 100%);
    font-family: "Pretendard Variable", Pretendard, system-ui, -apple-system, sans-serif;
    color: #0f1d16; -webkit-font-smoothing: antialiased;
  }
  .lp-wrap { width: 100%; max-width: 520px; }
  .lp-logo { display: flex; align-items: center; justify-content: center; margin: 0 0 18px; }
  .lp-logo img { height: 34px; width: auto; }
  .lp-foot { text-align: center; margin: 16px 4px 0; font-size: 12.5px; color: #7c8c84; line-height: 1.6; }
  .lp-foot a { color: #46665a; text-decoration: none; font-weight: 600; }
  /* 단독 페이지라 form-card 그림자 살짝 강화 */
  .lp-wrap .form-card { box-shadow: 0 18px 50px rgba(15,29,22,.10); }
</style>
</head>
<body>

<main class="lp-wrap">
  <div class="lp-logo">
    <img src="images/logo-green.png" alt="핫딜마켓" />
  </div>

  <div class="form-card">
    <h3>가맹 상담 신청</h3>
    <p class="sub">아래 정보를 남겨주시면 빠르게 연락드리겠습니다.</p>
    <form class="apply-form" novalidate>
      <div class="field-row">
        <div class="field"><label>성함 <span class="req">*</span></label><input type="text" name="name" placeholder="홍길동" required /></div>
        <div class="field"><label>연락처 <span class="req">*</span></label><input type="tel" name="phone" placeholder="010-0000-0000" required /></div>
      </div>
      <div class="field-row">
        <div class="field"><label>희망 지역</label><input type="text" name="region" placeholder="예: 서울 강서구" /></div>
        <div class="field"><label>점포 상태</label>
          <select name="store">
            <option value="">선택해주세요</option>
            <option>업종변경 (기존 매장 보유)</option>
            <option>소자본 신규창업</option>
            <option>신규창업 (인테리어 시공)</option>
            <option>미정 / 상담 후 결정</option>
          </select>
        </div>
      </div>
      <div class="field"><label>문의 내용</label><textarea name="message" placeholder="예상 투자금, 상권, 운영 방식 등 궁금한 점을 남겨주세요."></textarea></div>
      <label class="consent"><input type="checkbox" name="agree" required /><span>개인정보 수집·이용에 동의합니다. (상담 목적으로만 사용됩니다)</span></label>
      <button type="submit" class="btn btn-accent btn-block btn-lg">상담 신청하기</button>
    </form>
  </div>

  <p class="lp-foot">㈜새롭 · 가맹 상담 <a href="tel:010-5503-8979">010-5503-8979</a> (평일 10:00~22:00)</p>
</main>

<div class="toast" id="toast"><span id="toastMsg">상담 신청이 접수되었습니다!</span></div>

<script>
(function () {
  var FORM_ENDPOINT = "https://script.google.com/macros/s/AKfycbxxJ4ipqPW1HFpPN0nUSym55rvdx5UgbNwwg24cFBADznVy_E0s53_XT4t4iygb9PAkjQ/exec";
  var toast = document.getElementById("toast");
  var toastMsg = document.getElementById("toastMsg");
  var tt;
  function showToast(m) {
    if (m) toastMsg.textContent = m;
    toast.classList.add("show");
    clearTimeout(tt);
    tt = setTimeout(function () { toast.classList.remove("show"); }, 3400);
  }
  var form = document.querySelector(".apply-form");
  var sending = false;
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    if (sending) return;
    var name = (form.querySelector('[name="name"]') || {}).value || "";
    var phone = (form.querySelector('[name="phone"]') || {}).value || "";
    var agree = form.querySelector('[name="agree"]');
    if (!name.trim()) { showToast("성함을 입력해주세요."); return; }
    if (!/[0-9]{2,3}.*[0-9]{3,4}.*[0-9]{4}/.test(phone.replace(/\s/g, ""))) {
      showToast("연락처를 정확히 입력해주세요. (예: 010-0000-0000)"); return;
    }
    if (agree && !agree.checked) { showToast("개인정보 수집·이용에 동의해주세요."); return; }
    var btn = form.querySelector('button[type="submit"]');
    var label = btn ? btn.textContent : "";
    sending = true;
    if (btn) { btn.disabled = true; btn.textContent = "전송 중…"; }
    var data = new URLSearchParams();
    data.append("name", name.trim());
    data.append("phone", phone.trim());
    data.append("region", (form.querySelector('[name="region"]') || {}).value || "");
    data.append("store", (form.querySelector('[name="store"]') || {}).value || "");
    data.append("message", (form.querySelector('[name="message"]') || {}).value || "");
    data.append("source", "인스타그램 광고(apply.html) · " + location.href);
    fetch(FORM_ENDPOINT, { method: "POST", mode: "no-cors", body: data })
      .then(function () { showToast(name.trim() + "님, 상담 신청이 접수되었습니다! 곧 연락드릴게요."); form.reset(); })
      .catch(function () { showToast("전송에 실패했어요. 잠시 후 다시 시도하거나 010-5503-8979로 연락 주세요."); })
      .then(function () { sending = false; if (btn) { btn.disabled = false; btn.textContent = label; } });
  });
})();
</script>

</body>
</html>
